{% extends "base.html" %}

{% block title %}编辑题目 - 大学生画像可视化系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12 mb-4">
        <div class="card fade-in gradient-header">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0">
                            <div class="avatar-circle gradient-blue">
                                <i class="fas fa-edit"></i>
                            </div>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <h4 class="card-title mb-1">编辑题目</h4>
                            <p class="text-muted mb-0 small">修改测验题目信息</p>
                        </div>
                    </div>
                    <div>
                        <a href="{{ url_for('quiz.index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>返回题库
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<form method="POST" action="{{ url_for('quiz.edit', question_id=question.id) }}" id="questionForm">
    <div class="row">
        <div class="col-md-6">
            <div class="card fade-in" style="animation-delay: 0.1s;">
                <div class="card-header gradient-blue-light">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-info-circle me-2"></i>基本信息
                    </h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="topic" class="form-label">知识点</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary">
                                <i class="fas fa-tag"></i>
                            </span>
                            <input type="text" class="form-control" id="topic" name="topic" placeholder="例如：循环结构" value="{{ question.topic }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="difficulty" class="form-label">难度等级</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary">
                                <i class="fas fa-signal"></i>
                            </span>
                            <select class="form-select" id="difficulty" name="difficulty" required>
                                <option value="">选择难度</option>
                                <option value="简单" {% if question.difficulty == '简单' %}selected{% endif %}>简单</option>
                                <option value="中等" {% if question.difficulty == '中等' %}selected{% endif %}>中等</option>
                                <option value="困难" {% if question.difficulty == '困难' %}selected{% endif %}>困难</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="style" class="form-label">题目类型</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary">
                                <i class="fas fa-tasks"></i>
                            </span>
                            <select class="form-select" id="style" name="style" required>
                                <option value="">选择类型</option>
                                <option value="选择题" {% if question.style == '选择题' %}selected{% endif %}>选择题</option>
                                <option value="填空题" {% if question.style == '填空题' %}selected{% endif %}>填空题</option>
                                <option value="判断题" {% if question.style == '判断题' %}selected{% endif %}>判断题</option>
                                <option value="解答题" {% if question.style == '解答题' %}selected{% endif %}>解答题</option>
                                <option value="编程题" {% if question.style == '编程题' %}selected{% endif %}>编程题</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card fade-in" style="animation-delay: 0.2s;">
                <div class="card-header gradient-purple-light">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-question-circle me-2"></i>题目内容
                    </h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="content" class="form-label">题目描述</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary">
                                <i class="fas fa-file-alt"></i>
                            </span>
                            <textarea class="form-control" id="content" name="content" rows="4" placeholder="请输入题目描述" required>{{ question.content }}</textarea>
                        </div>
                    </div>
                    
                    <div id="optionsSection" class="mb-3" {% if question.style != '选择题' and question.style != '判断题' %}style="display: none;"{% endif %}>
                        <label class="form-label">选项</label>
                        <div id="optionsContainer">
                            <!-- 选项将在这里动态添加 -->
                        </div>
                        <button type="button" class="btn btn-gradient-green mt-2" id="addOptionBtn">
                            <i class="fas fa-plus me-2"></i>添加选项
                        </button>
                        <input type="hidden" id="options" name="options" value="{{ question.options }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="answer" class="form-label">正确答案</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary">
                                <i class="fas fa-check-circle"></i>
                            </span>
                            <textarea class="form-control" id="answer" name="answer" rows="2" placeholder="请输入正确答案" required>{{ question.answer }}</textarea>
                        </div>
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>选择题：请输入选项字母（如A）；判断题：请输入"正确"或"错误"
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row mt-4 mb-4">
        <div class="col-12 text-center">
            <a href="{{ url_for('quiz.index') }}" class="btn btn-outline-secondary me-2">
                <i class="fas fa-times me-2"></i>取消
            </a>
            <button type="submit" class="btn btn-gradient-blue">
                <i class="fas fa-save me-2"></i>保存修改
            </button>
        </div>
    </div>
</form>
{% endblock %}

{% block styles %}
<style>
    .gradient-header {
        border: none;
        background: rgba(28, 33, 40, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(67, 100, 247, 0.2);
    }
    
    .avatar-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.2rem;
    }
    
    .gradient-green {
        background: linear-gradient(45deg, #4CAF50, #8BC34A);
    }
    
    .gradient-blue {
        background: linear-gradient(45deg, #2196F3, #4FC3F7);
    }
    
    .gradient-purple {
        background: linear-gradient(45deg, #9C27B0, #BA68C8);
    }
    
    .fade-in {
        opacity: 0;
        animation: fadeInUp 0.5s ease forwards;
    }
    
    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .gradient-green-light {
        background: linear-gradient(135deg, rgba(46, 160, 67, 0.15), rgba(72, 187, 120, 0.1));
        border: none;
        color: #3FB950;
    }
    
    .gradient-blue-light {
        background: linear-gradient(135deg, rgba(67, 100, 247, 0.15), rgba(111, 177, 252, 0.1));
        border: none;
        color: #6FB1FC;
    }
    
    .gradient-purple-light {
        background: linear-gradient(135deg, rgba(163, 113, 247, 0.15), rgba(199, 125, 239, 0.1));
        border: none;
        color: #1a1a1a;
    }
    
    .btn-gradient-green {
        background: linear-gradient(45deg, #4CAF50, #8BC34A);
        border: none;
        color: white;
        transition: all 0.3s ease;
        padding: 8px 16px;
        border-radius: 6px;
    }
    
    .btn-gradient-green:hover {
        background: linear-gradient(45deg, #3f9943, #7CB342);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        color: white;
        transform: translateY(-3px);
    }
    
    .btn-gradient-blue {
        background: linear-gradient(45deg, #2196F3, #4FC3F7);
        border: none;
        color: white;
        transition: all 0.3s ease;
        padding: 10px 24px;
        border-radius: 6px;
    }
    
    .btn-gradient-blue:hover {
        background: linear-gradient(45deg, #1E88E5, #29B6F6);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        color: white;
        transform: translateY(-3px);
    }
    
    .option-item {
        display: flex;
        align-items: center;
        margin-bottom: 0.5rem;
    }
    
    .option-label {
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-elevated);
        color: var(--text-secondary);
        border-radius: 50%;
        margin-right: 0.5rem;
    }
    
    .option-input {
        flex-grow: 1;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 解析选项数据
    const optionsInput = document.getElementById('options');
    let options = [];
    
    if (optionsInput.value) {
        try {
            options = JSON.parse(optionsInput.value);
        } catch (e) {
            console.error('解析选项数据出错', e);
        }
    }
    
    // 创建选项UI
    const optionsContainer = document.getElementById('optionsContainer');
    
    function renderOptions() {
        optionsContainer.innerHTML = '';
        options.forEach((option, index) => {
            const label = String.fromCharCode(65 + index); // A, B, C, ...
            const optionItem = document.createElement('div');
            optionItem.className = 'mb-2';
            optionItem.innerHTML = `
                <div class="input-group">
                    <span class="input-group-text bg-light text-primary">${label}</span>
                    <input type="text" class="form-control" value="${option}" data-index="${index}">
                    <button type="button" class="btn btn-outline-danger" data-index="${index}">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            // 监听选项内容变化
            const input = optionItem.querySelector('input');
            input.addEventListener('input', function() {
                options[index] = this.value;
                updateOptionsInput();
            });
            
            // 监听删除按钮点击
            const removeBtn = optionItem.querySelector('button');
            removeBtn.addEventListener('click', function() {
                options.splice(index, 1);
                renderOptions();
                updateOptionsInput();
            });
            
            optionsContainer.appendChild(optionItem);
        });
    }
    
    // 根据题目类型显示或隐藏选项区域
    const styleSelect = document.getElementById('style');
    styleSelect.addEventListener('change', function() {
        const style = this.value;
        const optionsSection = document.getElementById('optionsSection');
        
        if (style === '选择题' || style === '判断题') {
            optionsSection.style.display = 'block';
            
            if (style === '判断题' && options.length === 0) {
                // 判断题默认添加"正确"和"错误"选项
                options = ['正确', '错误'];
                renderOptions();
                updateOptionsInput();
            }
        } else {
            optionsSection.style.display = 'none';
        }
    });
    
    // 添加选项按钮
    const addOptionBtn = document.getElementById('addOptionBtn');
    addOptionBtn.addEventListener('click', function() {
        options.push('');
        renderOptions();
        updateOptionsInput();
    });
    
    // 更新隐藏的选项输入
    function updateOptionsInput() {
        optionsInput.value = JSON.stringify(options);
    }
    
    // 初始化渲染选项
    if (options.length > 0) {
        renderOptions();
    } else if (styleSelect.value === '选择题') {
        // 如果是选择题但没有选项，添加默认的四个选项
        options = ['', '', '', ''];
        renderOptions();
        updateOptionsInput();
    } else if (styleSelect.value === '判断题') {
        // 如果是判断题，添加"正确"和"错误"选项
        options = ['正确', '错误'];
        renderOptions();
        updateOptionsInput();
    }
});
</script>
{% endblock %}
