{% extends "base.html" %}
{% block title %}未找到数据{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4" style="font-size:80px;color:rgba(251,191,36,0.3);">
                <i class="fas fa-search"></i>
            </div>
            <h3 class="text-white mb-3">{{ message|default('未找到相关数据', true) }}</h3>
            <p class="text-muted mb-4">请检查参数是否正确，或选择其他知识点查看。</p>
            <a href="{{ url_for('analysis.index') }}" class="btn btn-primary">
                <i class="fas fa-chart-bar me-1"></i>返回分析中心
            </a>
        </div>
    </div>
</div>
{% endblock %}
